<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鬼灯の剣士</title>
  <script src="game.js" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

    :root {
      --bg:       #0d0d1a;
      --panel:    #131326;
      --border:   #2a2a4a;
      --accent:   #c8a96e;
      --gold:     #f0c040;
      --hp:       #e05555;
      --mp:       #8855ee;
      --green:    #55cc88;
      --text:     #dde0f0;
      --subtext:  #8888aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 20%, #1a0d2a 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, #0d1a1a 0%, transparent 60%);
    }

    h1 {
      font-size: 2.2rem;
      color: var(--accent);
      margin-bottom: 24px;
      letter-spacing: 0.3em;
      text-shadow: 0 0 20px #c8a96e88, 0 0 40px #c8a96e33;
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #c8a96e66; }
      to   { text-shadow: 0 0 30px #c8a96ecc, 0 0 60px #c8a96e55; }
    }

    #app { width: 100%; max-width: 640px; }

    /* ── スタート画面 ── */
    #start-screen {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
    }
    #start-screen h2 {
      color: var(--accent);
      margin-bottom: 20px;
      font-size: 1.2rem;
      letter-spacing: 0.2em;
    }
    #start-screen p {
      color: var(--subtext);
      font-size: 0.85rem;
      margin-bottom: 24px;
      line-height: 2;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px 16px;
      margin: 8px 0;
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
    }

    /* ── ボタン ── */
    button {
      padding: 10px 20px;
      margin: 4px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #c8a96e11;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px #c8a96e22;
    }
    button:active { transform: translateY(0); }
    button.primary {
      border-color: var(--accent);
      color: var(--accent);
      padding: 14px 32px;
      font-size: 1rem;
      letter-spacing: 0.15em;
    }
    button.danger {
      border-color: var(--hp);
      color: var(--hp);
    }
    button.danger:hover { background: #e0555511; }
    button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── パネル共通 ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .panel-title {
      font-size: 0.75rem;
      color: var(--subtext);
      letter-spacing: 0.2em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* ── ステータス ── */
    #status-box { position: relative; }
    .hero-name {
      font-size: 1.15rem;
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .bar-wrap { display: flex; flex-direction: column; gap: 3px; }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
    }
    .bar-label span:first-child { color: var(--subtext); }
    .bar-bg {
      background: #1a1a2e;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .bar-fill.hp { background: linear-gradient(90deg, #c03030, #e05555); }
    .bar-fill.mp { background: linear-gradient(90deg, #6633bb, #8855ee); }

    .stat-nums {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 0.85rem;
    }
    .stat-nums span { color: var(--subtext); }
    .stat-nums b    { color: var(--text); }
    .gold-text { color: var(--gold); font-weight: bold; }

    /* ── 敵 ── */
    #enemy-box { display: none; }
    .enemy-name {
      font-size: 1.2rem;
      color: var(--hp);
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 0.1em;
      animation: enemy-appear 0.4s ease;
    }
    @keyframes enemy-appear {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── ログ ── */
    #log-box {
      background: #080810;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      min-height: 140px;
      max-height: 220px;
      overflow-y: auto;
      font-size: 0.88rem;
      line-height: 1.8;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #log-box p {
      padding: 2px 0;
      border-bottom: 1px solid #ffffff08;
      animation: log-in 0.3s ease;
    }
    @keyframes log-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── マップ ── */
    #map-screen { display: none; }
    #map-canvas {
      border: 1px solid var(--border);
      border-radius: 8px;
      display: block;
      margin: 0 auto 12px;
      image-rendering: pixelated;
    }
    .map-hint {
      text-align: center;
      color: var(--subtext);
      font-size: 0.8rem;
      margin-bottom: 10px;
    }

    /* ── ボタングループ ── */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .btn-group-title {
      width: 100%;
      font-size: 0.75rem;
      color: var(--subtext);
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }

    #game-screen { display: none; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.3s ease; }
  </style>
</head>
<body>
  <h1>🏮 鬼灯の剣士</h1>
  <div id="app">

    <!-- ─── スタート画面 ─── -->
    <div id="start-screen">
      <h2>― 鬼の世に、剣を抜け ―</h2>
      <p>幽霧国に魔王・夜叉羅の軍勢が押し寄せた。<br>汝の名は何という？</p>
      <input type="text" id="hero-name" placeholder="名を入力せよ..." maxlength="10">
      <select id="hero-class">
        <option value="侍">⚔️  侍　―　鋼の守りと力強い一太刀</option>
        <option value="陰陽師">🔮 陰陽師 ― 秘めた霊力で鬼を焼く</option>
        <option value="忍">🗡️  忍　―　疾風の如き素早さと暗殺術</option>
      </select>
      <br><br>
      <button class="primary" id="start-btn">🏮 剣を抜く</button>
      <br><br>
      <div style="border-top:1px solid #2a2a4a;padding-top:16px;margin-top:8px;">
        <p style="color:#8888aa;font-size:0.85rem;margin-bottom:12px;">― つづきから ―</p>
        <input type="text" id="load-name" placeholder="名を入力せよ...">
        <button id="load-btn">📂 記憶を辿る</button>
      </div>
    </div>

    <!-- ─── ゲーム画面 ─── -->
    <div id="game-screen">

      <!-- ステータス -->
      <div class="panel" id="status-box">
        <div class="panel-title">剣士の状態</div>
        <div class="hero-name" id="s-name">---</div>
        <div class="stat-grid">
          <div class="bar-wrap">
            <div class="bar-label"><span>体力</span><span id="s-hp-txt">-/-</span></div>
            <div class="bar-bg"><div class="bar-fill hp" id="s-hp-bar" style="width:100%"></div></div>
          </div>
          <div class="bar-wrap">
            <div class="bar-label"><span>霊力</span><span id="s-mp-txt">-/-</span></div>
            <div class="bar-bg"><div class="bar-fill mp" id="s-mp-bar" style="width:100%"></div></div>
          </div>
        </div>
        <div class="stat-nums">
          <span>攻撃 <b id="s-atk">-</b></span>
          <span>防御 <b id="s-def">-</b></span>
          <span>経験 <b id="s-exp">-/-</b></span>
          <span class="gold-text" id="s-gold">- 両</span>
        </div>
      </div>

      <!-- 敵パネル -->
      <div class="panel" id="enemy-box">
        <div class="panel-title">敵</div>
        <div class="enemy-name" id="e-name">---</div>
        <div class="bar-wrap">
          <div class="bar-label"><span>体力</span><span id="e-hp-txt">-/-</span></div>
          <div class="bar-bg" style="height:12px">
            <div class="bar-fill hp" id="e-hp-bar" style="width:100%"></div>
          </div>
        </div>
      </div>

      <!-- ログ -->
      <div id="log-box"></div>

      <!-- マップ画面 -->
      <div id="map-screen">
        <canvas id="map-canvas" width="448" height="320"></canvas>
        <p class="map-hint">矢印キー or WASD で移動　ESC で里に戻る</p>
        <div class="btn-group">
          <button onclick="exitMap()">🏯 里に戻る</button>
        </div>
      </div>

      <!-- 町メニュー -->
      <div id="town-buttons">
        <div class="btn-group">
          <div class="btn-group-title">🏯 里メニュー</div>
          <button onclick="enterMap()">⛩️ 旅に出る</button>
          <button onclick="useInn()">🏯 宿場（10両）</button>
          <button onclick="showQuests()">📋 依頼板</button>
          <button onclick="showForge()">🔨 鍛冶屋</button>
          <button onclick="showBestiary()">📖 鬼図鑑</button>
          <button onclick="saveGame()">💾 記録する</button>
        </div>
        <div id="sub-panel" style="display:none" class="panel"></div>
      </div>

      <!-- 戦闘メニュー -->
      <div id="action-buttons" style="display:none">
        <div class="btn-group">
          <div class="btn-group-title">⚔️ 戦闘</div>
          <button onclick="doAction('attack')">⚔️ 斬る</button>
          <button onclick="showSkills()">🔮 術技</button>
          <button onclick="doAction('item','傷薬')">💊 傷薬</button>
          <button class="danger" onclick="doAction('run')">🏃 逃げる</button>
        </div>
      </div>

      <!-- スキルメニュー -->
      <div id="skill-buttons" style="display:none" class="btn-group"></div>

    </div>
  </div>
</body>
</html>
